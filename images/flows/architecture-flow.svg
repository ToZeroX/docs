<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" font-family="-apple-system, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif">
  <rect width="960" height="400" fill="#fff" rx="8" />
  <style>
        .box { rx: 8; ry: 8; stroke-width: 1.5; }
        .box-user { fill: #F0F9FF; stroke: #3B82F6; }
        .box-payin { fill: #ECFDF5; stroke: #16A34A; }
        .box-wallet { fill: #FFF7ED; stroke: #EA580C; }
        .box-action { fill: #F5F3FF; stroke: #7C3AED; }
        .box-out { fill: #FEF2F2; stroke: #DC2626; }
        .box-bank { fill: #FFFBEB; stroke: #D97706; }
        .lbl { font-size: 13px; fill: #333; text-anchor: middle; dominant-baseline: central; font-weight: 500; }
        .sublbl { font-size: 10px; fill: #888; text-anchor: middle; dominant-baseline: central; }
        .arrow { fill: none; stroke: #94A3B8; stroke-width: 1.5; marker-end: url(#ah); }
        .arrow-down { fill: none; stroke: #94A3B8; stroke-width: 1.5; marker-end: url(#ah); }
        .edge-lbl { font-size: 10px; fill: #64748B; text-anchor: middle; }
    </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94A3B8" />
    </marker>
  </defs>
  <rect x="30" y="165" width="100" height="50" class="box box-user" />
  <text x="80.0" y="190.0" class="lbl">终端用户</text>
  <rect x="190" y="165" width="120" height="50" class="box box-payin" />
  <text x="250.0" y="182.0" class="lbl">Payin 收款</text>
  <text x="250.0" y="200.0" class="sublbl">USDT/USDC 链上</text>
  <rect x="370" y="120" width="140" height="50" class="box box-payin" />
  <text x="440.0" y="145.0" class="lbl">扣服务费+汇率换算</text>
  <rect x="570" y="150" width="160" height="60" class="box box-wallet" />
  <text x="650.0" y="172.0" class="lbl">商户 NUSD</text>
  <text x="650.0" y="190.0" class="sublbl">钱包余额</text>
  <rect x="570" y="30" width="140" height="45" class="box box-action" />
  <text x="640.0" y="52.5" class="lbl">划转（内部调拨）</text>
  <rect x="790" y="30" width="140" height="45" class="box box-out" />
  <text x="860.0" y="52.5" class="lbl">其他项目钱包</text>
  <rect x="790" y="120" width="140" height="45" class="box box-out" />
  <text x="860.0" y="134.5" class="lbl">链上转账</text>
  <text x="860.0" y="152.5" class="sublbl">Payout 付款</text>
  <rect x="570" y="280" width="160" height="50" class="box box-bank" />
  <text x="650.0" y="297.0" class="lbl">NUSD → USD</text>
  <text x="650.0" y="315.0" class="sublbl">结算到银行</text>
  <rect x="790" y="280" width="140" height="45" class="box box-bank" />
  <text x="860.0" y="302.5" class="lbl">商户银行账户</text>
  <rect x="790" y="200" width="140" height="45" class="box box-user" />
  <text x="860.0" y="222.5" class="lbl">用户钱包地址</text>
  <line x1="130" y1="190" x2="188" y2="190" class="arrow" />
  <text x="160" y="182" class="edge-lbl">USDT/USDC</text>
  <line x1="310" y1="190" x2="368" y2="150" class="arrow" />
  <line x1="510" y1="145" x2="568" y2="170" class="arrow" />
  <line x1="650" y1="148" x2="650" y2="77" class="arrow" />
  <line x1="710" y1="52" x2="788" y2="52" class="arrow" />
  <line x1="730" y1="180" x2="788" y2="145" class="arrow" />
  <text x="760" y="155" class="edge-lbl">链上转账</text>
  <line x1="730" y1="180" x2="788" y2="220" class="arrow" />
  <line x1="650" y1="212" x2="650" y2="278" class="arrow" />
  <line x1="730" y1="305" x2="788" y2="305" class="arrow" />
  <text x="760" y="297" class="edge-lbl">OTC出金</text>
</svg>